<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE-EPISODES // PCVR</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #1a0033, #000000);
            color: #00ff9d;
            font-family: 'Courier New', monospace;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }
        .neon {
            text-shadow: 0 0 10px #00ff9d,
                        0 0 20px #00ff9d,
                        0 0 40px #ff00ff;
        }
        .container {
            max-width: 800px;
            margin: 120px auto;
            padding: 40px;
        }
        h1 {
            font-size: 3.8em;
            margin-bottom: 10px;
            letter-spacing: 6px;
        }
        p {
            font-size: 1.3em;
            opacity: 0.9;
            line-height: 1.5;
        }
        .btn {
            display: inline-block;
            margin: 30px 15px;
            padding: 16px 45px;
            background: transparent;
            color: #00ff9d;
            border: 2px solid #00ff9d;
            font-size: 1.25em;
            text-decoration: none;
            transition: all 0.4s;
            border-radius: 4px;
        }
        .btn:hover {
            background: #00ff9d;
            color: #000;
            box-shadow: 0 0 30px #00ff9d;
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(transparent, rgba(0, 255, 157, 0.08), transparent);
            animation: scan 4s linear infinite;
            pointer-events: none;
            z-index: 1;
        }
        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(300%); }
        }
    </style>
</head>
<body>
    <div class="scanline"></div>
    
    <div class="container">
        <h1 class="neon">LIVE-EPISODES</h1>
        <p>PCVR EDTECH // INTERACTIVE BROADCAST</p>
        
        <p style="margin: 50px 0 40px;">
            Real-time coding missions.<br>
            Drop in. Fix the code. Level up.
        </p>
        
        <a href="#" class="btn">START EPISODE 01</a>
        <a href="https://github.com/AIVaneer/PCVR-EdTech" class="btn">MAIN PCVR HUB</a>
        
        <p style="margin-top: 100px; font-size: 0.95em; opacity: 0.7;">
            Always for good, never for bad.<br>
            Built by AIVaneer • 2026
        </p>
    </div>
</body>
</html>
